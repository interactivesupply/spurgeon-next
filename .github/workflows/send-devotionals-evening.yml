name: Send Evening Devotional Email

on:
  workflow_dispatch: {}
  # 6 PM CST = 00:00 UTC next day  /  6 PM CDT = 23:00 UTC
  # Remove TEST_EMAIL_OVERRIDE from env/secrets to send to full subscriber list.
  schedule:
    - cron: '0 23 * * *'

jobs:
  send:
    name: Send M&E Evening
    runs-on: ubuntu-latest
    steps:
      - name: Send Morning and Evening (evening)
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"devotional":"morning_and_evening","period":"evening"}' \
            ${{ secrets.SITE_URL }}/api/send-devotional-email
